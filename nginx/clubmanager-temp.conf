server {
    listen 80;
    server_name clubmanagment.com club-management.com www.clubmanagment.com www.club-management.com;

    root /home/bartok-48/Documents/clubManager-V3/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /uploads {
        alias /home/bartok-48/Documents/clubManager-V3/backend/uploads;
    }
}
