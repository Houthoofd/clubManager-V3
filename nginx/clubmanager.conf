# Redirection HTTP → HTTPS + domaines secondaires vers le domaine principal
server {
    listen 80;
    server_name clubmanagment.com club-management.com www.clubmanagment.com www.club-management.com;
    return 301 https://clubmanagment.com$request_uri;
}

# Redirection HTTPS club-management.com → clubmanagment.com (domaine canonique)
server {
    listen 443 ssl;
    server_name club-management.com www.clubmanagment.com www.club-management.com;

    ssl_certificate     /etc/letsencrypt/live/clubmanagment.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clubmanagment.com/privkey.pem;

    return 301 https://clubmanagment.com$request_uri;
}

# Serveur principal
server {
    listen 443 ssl;
    server_name clubmanagment.com;

    # SSL — Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/clubmanagment.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clubmanagment.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Frontend — fichiers statiques (build Vite)
    root /home/bartok-48/clubManager-V3/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API — proxy vers Express (port 3000)
    location /api {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Fichiers uploadés (storage local)
    location /uploads {
        alias /home/bartok-48/clubManager-V3/backend/uploads;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Sécurité
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Logs
    access_log /var/log/nginx/clubmanager.access.log;
    error_log  /var/log/nginx/clubmanager.error.log;
}
